<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Styled Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Student Records</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Subject</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>001</td>
                <td>Alex Johnson</td>
                <td>Web Development</td>
                <td>A</td>
            </tr>
            <tr>
                <td>002</td>
                <td>Sam Smith</td>
                <td>Data Science</td>
                <td>B+</td>
            </tr>
            <tr>
                <td>003</td>
                <td>Maria Garcia</td>
                <td>UI/UX Design</td>
                <td>A-</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
